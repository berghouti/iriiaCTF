<!DOCTYPE html>
<html>

  <style>
    body { font-family: Arial, sans-serif; background: #f4f6f9; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
    .box { background: white; padding: 2rem 2.5rem; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,.1); max-width: 380px; width: 100%; }
    h2 { margin-bottom: 1.5rem; color: #333; }
    input { width: 100%; padding: .6rem .8rem; border: 1px solid #ddd; border-radius: 4px; margin-bottom: .8rem; font-size: .95rem; box-sizing: border-box; }
    button { width: 100%; padding: .7rem; background: #0066cc; color: white; border: none; border-radius: 4px; font-size: 1rem; cursor: pointer; }
    button:hover { background: #0052a3; }
    .note { font-size: .8rem; color: #999; margin-top: 1rem; text-align: center; }
  </style>

<body>
  <div class="box">
    <h2>🔒 Admin Login</h2>
    <p style="font-size:.85rem; color:#666; margin-bottom:1rem;">
      This page is "protected". But is it really? Open your browser's developer tools and inspect the source code...
    </p>
    <input type="text" placeholder="Username" />
    <input type="password" placeholder="Password" />
    <button onclick="alert('Wrong credentials!')">Login</button>
    <div class="note">Hint: Try F12 or Ctrl+U and look at the HTML source 👀</div>
